# Boundless edge Worker — wrangler config (spec 001 T07-shell-B slice 1).
#
# Used by BOTH `worker-build` (the Rust→wasm bundler, via `[build]`) and the local test harness
# (`@cloudflare/vitest-pool-workers` → miniflare), which reads the bindings from this file and
# emulates KV / Durable Objects / Queues in-process — NO Cloudflare account required.
#
# `wrangler deploy` (which DOES need an account) is the human gate (DEFERRED.md → T07-shell-B): the
# real KV namespace id, the Hyperdrive config id, the HMAC_KEY secret, and the Queues consumer are set
# there. The Hyperdrive BINDING + the auth data path are wired (below); only the deploy remains.
name = "boundless-worker"
main = "build/worker/shim.mjs"
# Pinned (not Date.now()) — bump deliberately. Recent stable compat date as of 2026-06.
compatibility_date = "2026-06-05"

# Disable wrangler CLI telemetry (matches web/wrangler.toml; I8 spirit). NB: this is a `wrangler`
# *CLI* setting only — it does not change anything about the deployed Worker's own behavior.
send_metrics = false

# Build command for BOTH `wrangler deploy` and `worker-build`. The real `PgAuthStore` over Hyperdrive
# is the only store now, so this is featureless — the old `scaffold`-feature `compile_error!` deploy
# guard is RETIRED (no hardcoded key / seeded member exists to protect against). Fail-closed moved to
# runtime: the W2 least-privilege guard rejects a superuser/BYPASSRLS DB role, and a missing
# HMAC_KEY/GROUP_ID/HYPERDRIVE binding errors the request. The local miniflare tests build via
# package.json's `build` script (same command) before `vitest run` — see vitest.config.ts.
[build]
command = "worker-build --release"

# The GroupHub Durable Object — one per Group; holds the §10-E ephemeral rate-limit / alert-dedup
# state and (this slice) a durable "served" counter via `state.storage()`.
[[durable_objects.bindings]]
name = "GROUP_HUB"
class_name = "GroupHub"

[[migrations]]
tag = "v1"
new_classes = ["GroupHub"]

# Signed-manifest KV (ADR-0014 / O2). This slice only READS a manifest index key (the serving +
# signing pipeline is deferred). The id is a placeholder — miniflare keys on the binding name, so it
# is ignored locally/in tests; replace it with the real namespace id at deploy.
# → docs/runbooks/deploy-worker.md step 2 (`wrangler kv namespace create MANIFEST`).
[[kv_namespaces]]
binding = "MANIFEST"
id = "REPLACE_AT_DEPLOY_kv_namespace_id"

# Admin-alert fanout (§10-E): the below-min / notifications-declined PII-free alerts are produced
# here and consumed by a separate notifier Worker (the consumer is deferred to the push spec).
[[queues.producers]]
binding = "ADMIN_ALERTS"
queue = "boundless-admin-alerts"

# This install's single Group id (glossary: one install = one Group) — the tenant every PgAuthStore
# query is RLS-scoped to. Committed default for local/CI; set the real id at deploy. NB: the HMAC_KEY
# (I3 per-instance secret) is NOT here — it is a `wrangler secret` at deploy and a test value injected
# by the vitest harness (`miniflare.bindings`); `env.var("HMAC_KEY")` reads either as plaintext.
[vars]
GROUP_ID = "00000000-0000-0000-0000-000000000001"

# Hyperdrive → Postgres (T07-shell-B PgAuthStore slice). workers-rs 0.8.3 HAS a first-class binding
# (`env.hyperdrive("HYPERDRIVE")?.connect()? -> Socket`), and the published tokio-postgres drives it
# over that Socket via the unnamed `query_typed*` family (ADR-0024 — NO fork; the earlier "needs a
# forked driver" note was wrong). `localConnectionString` is the LOCAL `wrangler dev` target (real
# local PG, no account); the vitest harness overrides it per-environment via `miniflare.hyperdrives`
# (see vitest.config.ts) — so the placeholder `id` is ignored locally/in tests. Replace it with the
# real Hyperdrive config id at deploy.
# → docs/runbooks/deploy-worker.md steps 0–1 (`provision-neon.sh` → `wrangler hyperdrive create`).
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "REPLACE_AT_DEPLOY_hyperdrive_id"
localConnectionString = "postgresql://boundless_app:boundless_app@localhost:55432/boundless_test"
