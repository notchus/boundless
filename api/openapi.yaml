# Boundless HTTP API — OpenAPI 3.1. SOURCE OF TRUTH for the HTTP contract
# (docs/stack-matrix.md → API contracts). Generated clients live in api/generated/<lang>/
# and are produced by scripts/generate-bindings.sh — NEVER hand-edit generated files
# (enforced by scripts/check-binding-drift.sh).
#
# FROZEN at spec 001 task T10 (the contract-freeze gate, blocks Wave-7 UIs). Any future
# change to a shipped shape is a deliberate, ADR-gated event (see plan §5 DR-5 + ADR-0001).
#
# Fidelity (P4): the response shapes mirror the frozen golden fixtures (fixtures/auth/*.json,
# authored T02 and replayed in T04/T07), which are the authoritative HTTP *wire* shapes. The
# Rust core's internal response structs are the orchestration representation; the deferred Worker
# shell (T07-shell-B) maps them to this wire. Two kinds of correspondence:
#   • LEAF value types are reused verbatim from the verified core serde forms: AppVersion → string
#     "1.2.0"; Platform / Role enums; ManifestPointer → {index_key, locale_key_prefix} (the core
#     `ManifestPointer` carries both legs as of T10 — core/server/src/service.rs).
#   • RESPONSE ENVELOPES are flattened/renamed PROJECTIONS of the core structs, not identity maps:
#     core `VersionRequirement{min, recommended}` → the flat wire `client_min_version` /
#     `client_recommended_version`; the nested core `SignInResponse{version, manifest_pointer,
#     result}` → flat top-level fields; `manifest_pointer` is projected onto the matched variant
#     only (the core attaches it on every outcome). The Worker shell owns this projection.
#
# Authoring rule: golden fixtures deliberately carry NO secret values (no real tokens/codes are
# committed), using descriptive placeholders. Secret-bearing wire fields (access_token, refresh,
# fresh_recovery_code) are modeled here as documented, OPTIONAL, sensitive fields (TLS-only, to
# the legitimate client) so the contract is complete without invalidating a fixture.
#
# AC7: client_min_version + client_recommended_version are REQUIRED on EVERY /api/auth/* response
# (the VersionHandshake component, shared via allOf). Verified by web/tests/contract/
# api-contract.test.ts. Domain outcomes ride in the 200 body (no 4xx for not-on-file / below-min:
# HTTP status would itself be an existence oracle — carry-forward (b), no-existence-leak).
#
# Real codegen (swift-openapi-generator / openapi-generator-kotlin / openapi-typescript) is wired
# in T10-shell, per target, alongside the consuming UI tasks (T11–T15) — see DEFERRED.md.
openapi: 3.1.0
info:
  title: Boundless API
  version: 1.0.0
  summary: Onboarding & authentication (spec 001) — the auth + launch handshake.
  description: |
    The bottom-of-the-stack auth contract: member sign-in / device-bind / refresh / Driver
    recovery, the developer-only Admin-creation endpoint, and admin WebAuthn registration +
    assertion. Member-management — the admin `/api/admin/members/*` issuance surface — is spec 008,
    added ADDITIVELY here (the `/api/auth/*` shapes stay frozen; ADR-0026 governs admin→Worker trust).
  license:
    name: AGPL-3.0-only
    identifier: AGPL-3.0-only

paths:
  /api/auth/signin:
    post:
      operationId: authSignIn
      summary: Phone sign-in (no existence leak).
      description: |
        Looks up a member by phone: the client sends the E.164 `phone` (TLS-protected); the server
        normalizes it and computes the I3 `phone_lookup_hash` with the per-instance secret a client
        cannot hold (ADR-0023), then drops the plaintext (tainted type, never logged — P2). The
        response is uniform whether or not the phone matched (carry-forward (b)): it always carries
        the version handshake (AC7) and a manifest pointer, and the routing outcome rides in the
        body. A below-minimum client collapses to `AUTH_BELOW_MIN_VERSION` (O4/O8).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Sign-in evaluated (matched / not-on-file / below-min — routed in the body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignInResponse'

  /api/auth/bind-device:
    post:
      operationId: authBindDevice
      summary: Onboarding-Code device bind (server-validated, cannot complete offline).
      description: |
        Binds a `(member_id, platform, app_version)` device token (I4/AC4) after validating the
        Onboarding Code against server time (AC17 — single-use / TTL / rate-limit). All rejection
        causes route to the same calm `BindingFailed` screen.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindDeviceRequest'
      responses:
        '200':
          description: Bind evaluated (bound / failed / below-min — routed in the body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BindDeviceResponse'

  /api/auth/refresh:
    post:
      operationId: authRefresh
      summary: Silent refresh-credential rotation (replay detection).
      description: |
        Rotates the refresh credential (ADR-0016 D2). Every non-rotating outcome — unknown
        credential, revoked family, or detected replay — returns the uniform `AUTH_SESSION_INVALIDATED`
        (no lineage-existence leak; the replay-vs-unknown distinction is server-log-only). Access
        token = opaque-random bearer (ADR-0021).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refresh evaluated (rotated / invalidated / below-min — routed in the body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'

  /api/auth/recovery/rebind:
    post:
      operationId: authRecoveryRebind
      summary: Driver self-serve device replacement (Recovery Code).
      description: |
        Driver-only (ADR-0016 D3): re-binds a new device with a Recovery Code, invalidates the old
        token (I4), rotates the Recovery Code, and issues a session. Non-Drivers get
        `AUTH_RECOVERY_NOT_AVAILABLE` (Riders recover via an Admin re-issue). AC19.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoveryRebindRequest'
      responses:
        '200':
          description: Recovery evaluated (rebound / rejected / below-min — routed in the body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryRebindResponse'

  /api/dev/admins:
    post:
      operationId: devCreateAdmin
      summary: Developer-only Admin creation + invitation mint (I11).
      description: |
        Hardware-key-gated (WebAuthn) Developer endpoint. Mints a pending Admin + a single-use,
        72h, server-time-TTL invitation; the registration link is delivered out-of-band via Email
        Workers (ADR-0015) — the token is NOT returned in this response body. Unauthenticated AND
        admin-authenticated callers are both rejected (`DEV_ADMIN_CREATE_FORBIDDEN`, AC1/I11). The
        Developer WebAuthn verification + Email Workers delivery are the T08-shell (see DEFERRED.md).
      security:
        - developerWebAuthn: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminRequest'
      responses:
        '201':
          description: A pending Admin and a single-use invitation were minted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminInvitationMinted'
        '401':
          description: Unauthenticated caller — rejected (I11).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '403':
          description: Authenticated non-Developer (e.g. an Admin) — rejected (I11).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/admin/auth/invite/{token}:
    get:
      operationId: adminAuthInvite
      summary: Open an Admin registration link → WebAuthn registration options.
      description: |
        Resolves a single-use invitation. On a live invite, returns the WebAuthn
        PublicKeyCredentialCreationOptions for the registration ceremony (the W3C/@simplewebauthn
        shape; UV required, attestation none, resident keys preferred — AC20/ADR-0017 D4). On a
        reused/expired link, returns `ADMIN_INVITE_EXPIRED` / `ADMIN_INVITE_CONSUMED` routing to
        `InviteExpired`. The detailed ceremony I/O is owned by the edge-TS verifier (T09) and the
        SvelteKit shell (T15) — the documented P4 carve-out (ADR-0017 D4).
      parameters:
        - name: token
          in: path
          required: true
          description: The opaque, single-use invitation token (no PII; ADR-0015).
          schema:
            type: string
      responses:
        '200':
          description: A live invite — returns WebAuthn registration options.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebAuthnRegistrationOptions'
        '410':
          description: The invite was reused or has expired (single-use, server-time TTL — AC16).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteExpired'

  /api/admin/auth/register:
    post:
      operationId: adminAuthRegister
      summary: Verify a WebAuthn registration; consume the invite (AC16/AC20).
      description: |
        Verifies the attestation response (UV required, attestation none), consumes the invitation
        single-use, and stores the credential (multiple per admin; a Developer re-invite revokes
        prior credentials — D4 recovery). Edge-TS verification (ADR-0017 D4 carve-out); request /
        response are the standard WebAuthn registration shapes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebAuthnRegistrationCredential'
      responses:
        '200':
          description: Credential registered; the admin is Active.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuthResult'
        '400':
          description: Verification failed / invite already consumed/expired / UV missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/admin/auth/signin:
    post:
      operationId: adminAuthSignIn
      summary: Admin WebAuthn assertion sign-in (no password anywhere — AC2).
      description: |
        Verifies a WebAuthn assertion (UV required) and establishes the admin session (an
        httpOnly+Secure+SameSite=Strict cookie — §10-F, set by the SvelteKit shell). There is no
        password field anywhere in the admin auth flow (AC2). Edge-TS verification (ADR-0017 D4).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebAuthnAssertionCredential'
      responses:
        '200':
          description: Assertion verified; admin session established.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuthResult'
        '400':
          description: Assertion verification failed / UV missing / unknown credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  # ── Admin member-management (issuance) — spec 008 (additive) ───────────────────────────
  # Trust model (ADR-0026): the WebAuthn-verified SvelteKit BFF calls the Worker with a
  # server-to-server shared secret (adminSharedSecret) and asserts the acting admin's verified id
  # in the X-Admin-Id header. The Worker checks the secret (constant-time) and fails closed without
  # it. group_id is the single-install GROUP_ID binding (RLS scope). The real SvelteKit→Worker call
  # is wired at T10; these are the Worker-side shapes the contract freezes.
  /api/admin/members:
    get:
      operationId: adminListMembers
      summary: List the group's Rider/Driver members (PII-free summaries; not an audited read).
      description: |
        Returns the group's managed members (Riders/Drivers; Admins are EXCLUDED — they are not
        managed here, I11) as PII-free [`MemberSummary`] rows (display name + roles + onboarding
        status; NO phone/address). Listing is NOT an audited PII read (name-alone is not the
        P2-sensitive unit). Filterable by free-text search, role, and onboarding status.
      security:
        - adminSharedSecret: []
      parameters:
        - $ref: '#/components/parameters/AdminIdHeader'
        - name: search
          in: query
          required: false
          description: Free-text filter over member display names.
          schema:
            type: string
        - name: role
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Role'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OnboardingStatus'
      responses:
        '200':
          description: The member list (PII-free summaries).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberList'
        '401':
          description: Missing/invalid admin shared-secret credential (ADR-0026).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
    post:
      operationId: adminIssueMember
      summary: Issue (create) a Rider/Driver member + mint a one-time Onboarding Code (AC1/AC5).
      # PII handler: a phone collision surfaces-and-links an EXISTING member (name) — an I5-audited
      # admin-only disclosure. The Worker writes the audit row atomically (P4/I5).
      x-requires-audit: true
      description: |
        Creates a member from admin-entered PII — name/address encrypted at rest (I1), phone two-fold
        (I3) — and mints a single live Onboarding Code (shown once). `roles` are Rider/Driver only;
        an Admin cannot be issued here (I11/AC10 — the request `roles` enum excludes `admin`). A phone
        already enrolled in the group surfaces-and-links the existing member (name only) — an
        admin-surface-only, I5-audited disclosure, never reused on `/api/auth/*`. Inbound PII is
        TLS-only; the server never logs or echoes it (P2/R10).
      security:
        - adminSharedSecret: []
      parameters:
        - $ref: '#/components/parameters/AdminIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueMemberRequest'
      responses:
        '201':
          description: The member was created; the Onboarding Code is shown once.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberIssued'
        '409':
          description: The phone is already enrolled — the existing member is surfaced (I5-audited).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicatePhoneLink'
        '400':
          description: |
            Validation rejected — invalid phone (`ADMIN_MEMBER_PHONE_INVALID`), invalid address
            (`ADMIN_MEMBER_ADDRESS_INVALID`), empty role set (`ADMIN_MEMBER_ROLES_REQUIRED`), or the
            `Admin` role (`ADMIN_MEMBER_ROLE_FORBIDDEN`). The submitted value is never echoed (P2/R10).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: Missing/invalid admin shared-secret credential (ADR-0026).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '503':
          description: |
            No per-Group encryption key (bootstrap incomplete) — fails closed
            (`ADMIN_GROUP_KEY_MISSING`); no member row is written (AC12/I1).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/admin/members/{id}:
    get:
      operationId: adminGetMember
      summary: Read a member's full detail — an AUDITED PII read (AC7).
      x-requires-audit: true
      description: |
        Returns the member's decrypted [`MemberDetail`] (name/phone/address). This is an audited PII
        read: the server writes an `audit_log` row (admin_id, member_id, field NAMES, request_id) in
        the SAME transaction as the ciphertext read (I5/§7). The PII is TLS-only; never logged (P2).
      security:
        - adminSharedSecret: []
      parameters:
        - $ref: '#/components/parameters/AdminIdHeader'
        - name: id
          in: path
          required: true
          description: The opaque member id.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The member detail (audited).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberDetail'
        '404':
          description: No such member (no PII read, no audit row written).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: Missing/invalid admin shared-secret credential (ADR-0026).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '503':
          description: Group key missing/undecryptable — fails closed (`ADMIN_GROUP_KEY_MISSING`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
    patch:
      operationId: adminEditMember
      summary: Edit a member under optimistic concurrency; returns the updated detail (audited, AC11).
      x-requires-audit: true
      description: |
        Updates changed fields only; a phone change recomputes the I3 lookup hash and re-encrypts.
        Optimistic concurrency on `expected_updated_at` — a concurrent edit yields
        `ADMIN_MEMBER_EDIT_STALE` with no partial write. Returns the updated [`MemberDetail`] (an
        audited read). Inbound PII is TLS-only; never logged (P2/R10).
      security:
        - adminSharedSecret: []
      parameters:
        - $ref: '#/components/parameters/AdminIdHeader'
        - name: id
          in: path
          required: true
          description: The opaque member id.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditMemberRequest'
      responses:
        '200':
          description: The updated member detail (audited).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberDetail'
        '409':
          description: Stale edit — the member's `updated_at` changed (`ADMIN_MEMBER_EDIT_STALE`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '400':
          description: |
            Validation rejected — invalid phone/address, empty role set, or the `Admin` role
            (same codes as issuance). The submitted value is never echoed (P2/R10).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '404':
          description: No such member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: Missing/invalid admin shared-secret credential (ADR-0026).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '503':
          description: Group key missing — fails closed (`ADMIN_GROUP_KEY_MISSING`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/admin/members/{id}/regenerate-code:
    post:
      operationId: adminRegenerateCode
      summary: Regenerate a member's Onboarding Code (AC6) — not an audited PII read.
      description: |
        Mints a fresh Onboarding Code and supersedes the prior live one atomically (at most one live
        code per member). The plaintext is shown once. Not an audited read (no name/phone/address is
        disclosed).
      security:
        - adminSharedSecret: []
      parameters:
        - $ref: '#/components/parameters/AdminIdHeader'
        - name: id
          in: path
          required: true
          description: The opaque member id.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: A fresh Onboarding Code (shown once) + its expiry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegenerateCodeResponse'
        '404':
          description: No such member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: Missing/invalid admin shared-secret credential (ADR-0026).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/admin/audit-log:
    get:
      operationId: adminReadAuditLog
      summary: Read the group's PII-read audit log (AC9 — field NAMES, never values).
      description: |
        Returns the I5 audit entries (timestamp, admin_id, member_id, the field NAMES read,
        request_id), optionally filtered to one member. `fields` are names only
        (`name`/`phone`/`address`) — never values — so reading the log is not itself a recursive PII
        read (it is not `x-requires-audit`).
      security:
        - adminSharedSecret: []
      parameters:
        - $ref: '#/components/parameters/AdminIdHeader'
        - name: member_id
          in: query
          required: false
          description: Filter to one member's audit entries.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The audit-log entries (names only).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'
        '401':
          description: Missing/invalid admin shared-secret credential (ADR-0026).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  # ── Admin WebAuthn store (Option B1) — spec 009 / ADR-0027 (additive) ───────────────────
  # The durable half of the admin passkey onboarding/sign-in: the WebAuthn-verified SvelteKit BFF
  # calls these server-to-server Worker routes over the SAME ADR-0026 shared secret (adminSharedSecret)
  # so the web tier holds zero Postgres. These run PRE-SESSION — the admin is being registered or
  # authenticated — so they carry the shared secret but NO X-Admin-Id (there is no verified acting
  # admin yet; the deliberate difference from /api/admin/members/*). The invite token rides in the
  # POST body, never the URL (R13). group_id is the single-install GROUP_ID binding (RLS, D3); the
  # invite-token HMAC compare runs in the Rust core (ADR-0017 P4 carve-out). These disclose admin
  # credential/invite METADATA, never member PII, so they are NOT x-requires-audit (D2/AC13). The
  # standalone consume/insert/revoke-all are INTERNAL store methods, not wire ops — register-complete
  # is the single atomic combined op (R11). The deployable Worker routes are T04; web adapters T05.
  /api/admin/webauthn/invite/resolve:
    post:
      operationId: adminWebauthnInviteResolve
      summary: Resolve a presented registration token → its pending-admin invite metadata (B1).
      description: |
        Computes the token's keyed at-rest hash IN THE CORE (`admin_invitation_token_hash`; the
        ADR-0017 P4 carve-out — never edge-TS, AC4b) and looks it up by the unique `token_hash` index
        inside the GROUP_ID-scoped RLS transaction (D3). Returns the PII-free [`AdminInviteRecord`]
        (`expires_at`/`consumed_at` for the edge-TS `evaluateInvite` verdict). An unknown OR
        cross-tenant token returns the same value-free 404 — NO existence oracle (R16). The token is
        in the body, never the URL or a log line (R13/I10).
      security:
        - adminSharedSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveInviteRequest'
      responses:
        '200':
          description: A matching invitation in this tenant — its PII-free metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminInviteRecord'
        '404':
          description: No matching live invitation (unknown or cross-tenant) — value-free, no oracle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: Missing/invalid admin shared-secret credential (ADR-0026, fails closed).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/admin/webauthn/register-complete:
    post:
      operationId: adminWebauthnRegisterComplete
      summary: Consume the invite + revoke prior credentials + insert the new one — ONE txn (B1, R11).
      description: |
        After the edge-TS ceremony verification succeeds, this performs the three-statement invariant
        atomically in ONE server-side transaction (R11): re-resolve + single-use consume
        (`consumed_at IS NULL`, RETURNING admin_id), revoke the admin's prior credentials (ADR-0016 D4),
        and insert the new credential. The `admin_id` is DERIVED from the just-consumed invitation row,
        never web-supplied. A token matching no live invitation in this tenant rolls back with nothing
        written and returns the value-free `ADMIN_INVITE_CONSUMED` (the TOCTOU backstop after the edge
        `evaluateInvite`). The token is in the body, never logged (R13).
      security:
        - adminSharedSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCompleteRequest'
      responses:
        '200':
          description: The invitation was consumed and the credential stored — returns the admin id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRegisterCompleteResult'
        '400':
          description: |
            The token matched no live invitation (already consumed / expired / unknown) — value-free
            `ADMIN_INVITE_CONSUMED`; nothing was written (the txn rolled back). No existence oracle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: Missing/invalid admin shared-secret credential (ADR-0026, fails closed).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/admin/webauthn/credentials/lookup:
    post:
      operationId: adminWebauthnCredentialLookup
      summary: Resolve a presented credential_id → the active credential for assertion sign-in (B1).
      description: |
        The usernameless/discoverable sign-in lookup: the admin assertion supplies no admin id, so the
        active credential is resolved by its presented `credential_id` (and the admin id is read OFF the
        resolved credential — hence pre-session, no X-Admin-Id). Returns the PII-free [`AdminCredential`]
        (admin id, COSE public key, sign-count) for the edge-TS `@simplewebauthn` assertion verifier. A
        revoked / unknown / cross-tenant credential returns the value-free 404 (RLS-scoped, D3).
      security:
        - adminSharedSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialLookupRequest'
      responses:
        '200':
          description: The active credential (PII-free) for assertion verification.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCredential'
        '404':
          description: No active credential with this id in this tenant — value-free.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '401':
          description: Missing/invalid admin shared-secret credential (ADR-0026, fails closed).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/admin/webauthn/credentials/{id}/sign-count:
    post:
      operationId: adminWebauthnBumpSignCount
      summary: Bump a credential's signature counter, only-if-greater (clone-detection backstop, B1/R10).
      description: |
        Advances the stored WebAuthn signature counter during assertion verification, ONLY IF strictly
        greater (the clone-detection backstop, R10) and only while the credential is active — a replayed
        assertion carrying a stale/equal counter is a no-op. Best-effort and idempotent: the result is
        not surfaced (204), mirroring the store method's unit return. RLS-scoped by GROUP_ID (D3).
      security:
        - adminSharedSecret: []
      parameters:
        - name: id
          in: path
          required: true
          description: The credential id (base64url-no-pad of the `credential_id` bytea — URL-safe).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignCountBumpRequest'
      responses:
        '204':
          description: The bump was applied (or no-op'd, only-if-greater) — no body.
        '401':
          description: Missing/invalid admin shared-secret credential (ADR-0026, fails closed).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

components:
  securitySchemes:
    developerWebAuthn:
      type: http
      scheme: bearer
      description: |
        The Developer's hardware-key-backed WebAuthn credential (I11). Verification is the
        T08-shell concern; modeled here only so the dev endpoint declares its auth requirement.
    adminSharedSecret:
      type: http
      scheme: bearer
      description: |
        The server-to-server shared secret the WebAuthn-verified SvelteKit BFF presents to the
        Worker for `/api/admin/members/*` (ADR-0026). The Worker checks it in constant time and
        FAILS CLOSED without it. This is NOT a client-facing credential — only the trusted admin BFF
        (which already verified the admin via WebAuthn, ADR-0017) holds it. The acting admin's
        verified id rides in the `X-Admin-Id` header (see `AdminIdHeader`).

  parameters:
    AdminIdHeader:
      name: X-Admin-Id
      in: header
      required: true
      description: |
        The verified acting admin's member id, asserted by the WebAuthn-verified BFF (ADR-0026). The
        Worker trusts it because the request carried the `adminSharedSecret`; it becomes the
        `admin_id` / `created_by` actor on the I5 audit row.
      schema:
        type: string
        format: uuid

  schemas:
    # ── Shared value types (verified serde wire forms from core/domain) ───────────────────
    AppVersion:
      type: string
      pattern: '^\d+\.\d+\.\d+$'
      description: Semantic application version `major.minor.patch` (core/domain AppVersion).
      examples: ['1.2.0']

    Platform:
      type: string
      description: Client build target (one leg of the I4 device-token tuple).
      enum: [ios, ipados, watchos, macos, android, wearos, web]

    Role:
      type: string
      description: A member's role within a Group (glossary).
      enum: [rider, driver, admin]

    ClientVersion:
      type: object
      description: What a client reports about itself at the auth handshake.
      required: [platform, app_version]
      properties:
        platform:
          $ref: '#/components/schemas/Platform'
        app_version:
          $ref: '#/components/schemas/AppVersion'

    # The AC7 anchor: every /api/auth/* response allOf's this, so both fields are REQUIRED
    # in every variant. Mirrors core/auth VersionRequirement (O4 / O5).
    VersionHandshake:
      type: object
      required: [client_min_version, client_recommended_version]
      properties:
        client_min_version:
          allOf: [{ $ref: '#/components/schemas/AppVersion' }]
          description: Below this, the client shows only the calm degradation screen (O4/O8).
        client_recommended_version:
          allOf: [{ $ref: '#/components/schemas/AppVersion' }]
          description: The O5 straggler signal (admin device-versions panel).

    ManifestPointer:
      type: object
      description: Where the client fetches the signed KV manifest at launch (ADR-0014).
      required: [index_key, locale_key_prefix]
      properties:
        index_key:
          type: string
          examples: ['manifest:v1:index']
        locale_key_prefix:
          type: string
          examples: ['manifest:v1:']

    SessionMaterial:
      type: object
      description: |
        The session issued on a successful bind / rebind / rotate. The access token is an
        opaque-random bearer (ADR-0021). Golden fixtures carry NO secret values — they show
        only `access_token_expires_in_secs` + the descriptive `refresh` placeholder.
      required: [access_token_expires_in_secs]
      properties:
        access_token:
          type: string
          description: |
            Opaque-random bearer (ADR-0021). Sensitive; delivered over TLS to the legitimate
            client only. Omitted from committed fixtures (no secrets in the repo).
        access_token_expires_in_secs:
          type: integer
          examples: [900]
        refresh:
          type: string
          description: |
            Refresh-credential handling. Native: the rotated opaque refresh credential, stored in
            Keychain / Android Keystore (§10-F). Web admin: delivered as an httpOnly+Secure+
            SameSite=Strict cookie, NOT this field. Golden fixtures use the descriptive placeholder
            "indefinite_silent_rotation".

    # ── /api/auth/signin ──────────────────────────────────────────────────────────────────
    SignInRequest:
      type: object
      required: [phone, reported]
      properties:
        phone:
          type: string
          description: |
            The member's phone number in E.164 form (e.g. `+15555550101`), TLS-protected. The
            server normalizes it and computes the I3 `phone_lookup_hash` with the per-instance
            secret (ADR-0023 — the keyed hash is server-side; a client cannot compute it), then
            drops the plaintext (tainted type, never logged — P2; only the keyed hash and
            `phone_encrypted` are persisted, I3/I5).
        reported:
          $ref: '#/components/schemas/ClientVersion'

    SignInResponse:
      description: Uniform sign-in response (matched / not-on-file / below-min). AC7/AC8.
      allOf:
        - $ref: '#/components/schemas/VersionHandshake'
        - oneOf:
            - $ref: '#/components/schemas/SignInMatched'
            - $ref: '#/components/schemas/PhoneNotOnFile'
            - $ref: '#/components/schemas/BelowMinVersion'

    SignInMatched:
      type: object
      required: [outcome, next_step, manifest_pointer]
      properties:
        outcome:
          type: string
          const: member_matched
        next_step:
          type: string
          const: device_binding
        manifest_pointer:
          $ref: '#/components/schemas/ManifestPointer'

    PhoneNotOnFile:
      type: object
      description: Lookup miss — never reveals whether a number exists (AUTH_PHONE_NOT_ON_FILE).
      required: [error_code]
      properties:
        error_code:
          type: string
          const: AUTH_PHONE_NOT_ON_FILE

    BelowMinVersion:
      type: object
      description: Reporting client below client_min_version — calm degradation only (O4/O8).
      required: [error_code]
      properties:
        error_code:
          type: string
          const: AUTH_BELOW_MIN_VERSION
        reported_client_version:
          $ref: '#/components/schemas/ClientVersion'

    # ── /api/auth/bind-device ──────────────────────────────────────────────────────────────
    BindDeviceRequest:
      type: object
      required: [phone, onboarding_code, reported, device_token]
      properties:
        phone:
          type: string
          description: |
            The member's phone number in E.164 form, TLS-protected. Server-hashed for the I3
            lookup, then dropped (ADR-0023; never logged — P2).
        onboarding_code:
          type: string
          description: The Onboarding Code the helper entered. Sensitive; server-validated.
        reported:
          $ref: '#/components/schemas/ClientVersion'
        device_token:
          type: string
          description: The APNs/FCM push token to bind to (member_id, platform, app_version) (I4).

    BindDeviceResponse:
      description: Uniform device-bind response (bound / failed / below-min). AC17/AC4/AC7.
      allOf:
        - $ref: '#/components/schemas/VersionHandshake'
        - oneOf:
            - $ref: '#/components/schemas/DeviceBound'
            - $ref: '#/components/schemas/BindingFailed'
            - $ref: '#/components/schemas/BelowMinVersion'

    DeviceBound:
      type: object
      required:
        [outcome, member_id, roles, platform, app_version, device_token_registered, session]
      properties:
        outcome:
          type: string
          const: device_bound
        member_id:
          type: string
          format: uuid
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        platform:
          $ref: '#/components/schemas/Platform'
        app_version:
          $ref: '#/components/schemas/AppVersion'
        device_token_registered:
          type: boolean
        session:
          $ref: '#/components/schemas/SessionMaterial'

    BindingFailed:
      type: object
      description: |
        Onboarding Code rejected — all causes route to the same calm `BindingFailed` screen
        (onboarding.binding.code_invalid). AC17.
      required: [error_code]
      properties:
        error_code:
          type: string
          enum:
            - AUTH_ONBOARDING_CODE_INVALID
            - AUTH_ONBOARDING_CODE_EXPIRED
            - AUTH_ONBOARDING_CODE_CONSUMED
            - AUTH_ONBOARDING_CODE_RATE_LIMITED

    # ── /api/auth/refresh ──────────────────────────────────────────────────────────────────
    RefreshRequest:
      type: object
      required: [reported]
      properties:
        reported:
          $ref: '#/components/schemas/ClientVersion'
        refresh_token:
          type: string
          description: |
            The presented refresh credential. Sensitive. Native clients send it here; the web
            admin presents it via the httpOnly session cookie (§10-F) instead of this field.

    RefreshResponse:
      description: Uniform refresh response (rotated / invalidated / below-min). AC18/AC7.
      allOf:
        - $ref: '#/components/schemas/VersionHandshake'
        - oneOf:
            - $ref: '#/components/schemas/RefreshRotated'
            - $ref: '#/components/schemas/SessionInvalidated'
            - $ref: '#/components/schemas/BelowMinVersion'

    RefreshRotated:
      type: object
      required: [outcome, session]
      properties:
        outcome:
          type: string
          const: rotated
        session:
          $ref: '#/components/schemas/SessionMaterial'

    SessionInvalidated:
      type: object
      description: |
        The session is over — unknown credential, revoked family, or a detected replay, all
        UNIFORM (no lineage-existence leak). `role` / `routes_to` are populated ONLY when the
        server authoritatively knows the member (e.g. a known-but-revoked session, as in the
        needs_reauth_help fixture); they are ABSENT on an unknown-credential reject. AC15/AC18.
      required: [error_code]
      properties:
        error_code:
          type: string
          const: AUTH_SESSION_INVALIDATED
        role:
          $ref: '#/components/schemas/Role'
        routes_to:
          type: string
          description: Client routing target for a known invalidated session.
          enum: [NeedsReauthHelp, PhoneEntry]

    # ── /api/auth/recovery/rebind ──────────────────────────────────────────────────────────
    RecoveryRebindRequest:
      type: object
      required: [phone, recovery_code, reported, device_token]
      properties:
        phone:
          type: string
          description: |
            The member's phone number in E.164 form, TLS-protected. Server-hashed for the I3
            lookup, then dropped (ADR-0023; never logged — P2).
        recovery_code:
          type: string
          description: The Driver-held Recovery Code. Sensitive; server-validated, rotated on use.
        reported:
          $ref: '#/components/schemas/ClientVersion'
        device_token:
          type: string
          description: The push token for the new device (I4).

    RecoveryRebindResponse:
      description: Uniform recovery response (rebound / rejected / below-min). AC19/AC7.
      allOf:
        - $ref: '#/components/schemas/VersionHandshake'
        - oneOf:
            - $ref: '#/components/schemas/DeviceRebound'
            - $ref: '#/components/schemas/RecoveryRejected'
            - $ref: '#/components/schemas/BelowMinVersion'

    DeviceRebound:
      type: object
      required:
        - outcome
        - member_id
        - roles
        - platform
        - app_version
        - old_device_token_invalidated
        - recovery_code_rotated
        - session
      properties:
        outcome:
          type: string
          const: device_rebound
        member_id:
          type: string
          format: uuid
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        platform:
          $ref: '#/components/schemas/Platform'
        app_version:
          $ref: '#/components/schemas/AppVersion'
        old_device_token_invalidated:
          type: boolean
        recovery_code_rotated:
          type: boolean
        session:
          $ref: '#/components/schemas/SessionMaterial'
        fresh_recovery_code:
          type: string
          description: |
            The rotated Recovery Code, shown once to the Driver to capture (ADR-0016 D3).
            Sensitive; TLS-only to the legitimate Driver. Omitted from committed fixtures (which
            instead signal rotation via `recovery_code_rotated: true`).

    RecoveryRejected:
      type: object
      description: |
        Rejected — a bad/used code (`AUTH_RECOVERY_CODE_INVALID`), or self-serve recovery is not
        available for this member's role (`AUTH_RECOVERY_NOT_AVAILABLE`; Riders recover via Admin).
      required: [error_code]
      properties:
        error_code:
          type: string
          enum:
            - AUTH_RECOVERY_CODE_INVALID
            - AUTH_RECOVERY_NOT_AVAILABLE

    # ── /api/dev/admins + /api/admin/auth/* (not AC7-bearing; shapes finalized by their shells) ─
    CreateAdminRequest:
      type: object
      description: |
        Developer admin-create input (e.g. a display name for the pending Admin). The detailed
        shape is finalized by the T08-shell; the authz gate (I11) is the contract here.
      additionalProperties: true

    AdminInvitationMinted:
      type: object
      description: |
        A pending Admin + single-use invitation were minted. PII-free; the registration token is
        delivered out-of-band via Email Workers (ADR-0015), NOT in this body.
      required: [admin_id, invitation_expires_at]
      properties:
        admin_id:
          type: string
          format: uuid
        invitation_expires_at:
          type: string
          format: date-time
          description: Server-time TTL (default 72h, AC16).

    WebAuthnRegistrationOptions:
      type: object
      description: |
        WebAuthn PublicKeyCredentialCreationOptions (W3C / @simplewebauthn). UV required,
        attestation none, resident keys preferred (AC20/ADR-0017 D4). The full shape is the
        standard WebAuthn options object; the edge-TS verifier (T09) owns it.
      required: [publicKey]
      properties:
        publicKey:
          type: object
          additionalProperties: true
        challenge_ttl_secs:
          type: integer
          examples: [300]

    WebAuthnRegistrationCredential:
      type: object
      description: The WebAuthn registration (attestation) response (W3C / @simplewebauthn).
      additionalProperties: true

    WebAuthnAssertionCredential:
      type: object
      description: The WebAuthn assertion response (W3C / @simplewebauthn).
      additionalProperties: true

    AdminAuthResult:
      type: object
      description: A successful admin registration / assertion outcome.
      required: [admin_id]
      properties:
        admin_id:
          type: string
          format: uuid

    InviteExpired:
      type: object
      description: A reused or expired Admin registration link (single-use, server-time TTL — AC16).
      required: [error_code, routes_to]
      properties:
        error_code:
          type: string
          enum: [ADMIN_INVITE_EXPIRED, ADMIN_INVITE_CONSUMED]
        routes_to:
          type: string
          const: InviteExpired

    ErrorBody:
      type: object
      description: |
        A generic error envelope carrying a stable, PII-free error code from docs/error-codes.md
        (P12). Used by the non-/api/auth/* endpoints (the auth endpoints carry their outcome +
        version handshake in the 200 body instead).
      required: [error_code]
      properties:
        error_code:
          type: string
          description: A stable code from docs/error-codes.md (e.g. DEV_ADMIN_CREATE_FORBIDDEN, ADMIN_WEBAUTHN_*).

    # ── Admin member-management (issuance) — spec 008 ──────────────────────────────────────
    OnboardingStatus:
      type: string
      description: |
        Where a member is in the issue → onboard lifecycle. Mirrors `core::server` `OnboardingStatus`
        ONE-FOR-ONE (snake_case values/order pinned in both; spec-008 T05 `onboarding_status_wire_casing`).
      enum: [issued_not_onboarded, onboarded, code_expired_or_lost, needs_reonboarding]

    IssuableRole:
      type: string
      description: |
        A role a member may be ISSUED with — Rider or Driver only. Admins are issued solely by the
        Developer (I11/AC10), so `admin` is NOT a member-issuance option. Distinct from `Role` (which
        includes `admin`, used when displaying an existing member). Mirrors `core::server::IssuableRole`.
      enum: [rider, driver]

    MemberSummary:
      type: object
      description: |
        The member-LIST projection (AC8) — PII-free: a display `name` + `roles` + `onboarding_status`,
        and deliberately NO `phone`/`address`. Because it carries no tainted field, listing is not an
        audited read. Mirrors `core::server::MemberSummary`.
      required: [member_id, name, roles, onboarding_status]
      properties:
        member_id:
          type: string
          format: uuid
        name:
          type: string
          description: |
            The member's display name, decrypted for the admin UI (AC3 — plain text, never persisted
            in clear). Still PII for LOGGING: log only the redacted form (P2).
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        onboarding_status:
          $ref: '#/components/schemas/OnboardingStatus'

    MemberList:
      type: object
      description: The admin member list (AC8) — PII-free summaries.
      required: [members]
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/MemberSummary'

    MemberDetail:
      type: object
      description: |
        The audited member-DETAIL view (the GET/PATCH `/{id}` response) — plain-string
        `name`/`phone`/`address`. The WIRE half of the two-type split: the `core::server` `MemberDetail`
        holds tainted types and cannot serialize, so the Worker projects it via `expose_secret` at the
        audited boundary (`MemberDetailView`). Carries decrypted PII, so the handler returning it is
        `x-requires-audit: true` (I5). TLS-only; NEVER logged (P2).
      required: [member_id, name, phone, address, roles, onboarding_status, updated_at]
      properties:
        member_id:
          type: string
          format: uuid
        name:
          type: string
          description: Plaintext name (TLS-only; never log).
        phone:
          type: string
          description: E.164 phone (TLS-only; never log).
        address:
          type: string
          description: Home address (TLS-only; never log).
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        onboarding_status:
          $ref: '#/components/schemas/OnboardingStatus'
        updated_at:
          type: integer
          format: int64
          description: The optimistic-concurrency token (server-time epoch seconds) echoed back on edit (AC11).

    IssueMemberRequest:
      type: object
      description: |
        Admin issuance input. PII (`name`/`address`/`phone`) is TLS-only; the server normalizes the
        phone in-core, hashes (I3) + encrypts (I1) it, and drops the plaintext (never logged — P2/R10).
        `roles` excludes `admin` (I11/AC10 — `IssuableRole`).
      required: [name, phone, address, roles]
      properties:
        name:
          type: string
        phone:
          type: string
          description: The member's phone (admin-entered; server-normalized to E.164). TLS-only.
        address:
          type: string
        roles:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/IssuableRole'

    MemberIssued:
      type: object
      description: |
        A member was created; the Onboarding Code is shown ONCE (sensitive, TLS-only — modeled like
        the auth `access_token`; omitted from committed fixtures). The `member` summary is PII-free.
      required: [member, code_expires_at]
      properties:
        member:
          $ref: '#/components/schemas/MemberSummary'
        onboarding_code:
          type: string
          description: |
            The single-use Onboarding Code, shown once to the admin (a helper reads it to the member).
            Sensitive; TLS-only to the legitimate admin. Omitted from committed fixtures (no secrets).
        code_expires_at:
          type: integer
          format: int64
          description: The code's server-time expiry (epoch seconds; `now + 72h`).

    DuplicatePhoneLink:
      type: object
      description: |
        The submitted phone is already enrolled in the group (`(group_id, phone_lookup_hash)` unique).
        The existing member is surfaced (NAME only) and the disclosure is I5-audited — admin-surface-
        only, never reused on `/api/auth/*` (the no-existence-leak discipline holds there). The admin
        resolves by editing the existing member.
      required: [error_code, existing]
      properties:
        error_code:
          type: string
          const: ADMIN_MEMBER_DUPLICATE_PHONE
        existing:
          $ref: '#/components/schemas/MemberSummary'

    EditMemberRequest:
      type: object
      description: |
        A member edit — each PII field is OPTIONAL (only changed fields are re-validated/re-encrypted).
        `expected_updated_at` is the optimistic-concurrency token the client loaded (AC11). PII is
        TLS-only; never logged (P2/R10). `roles` (if present) excludes `admin` (I11) and must be non-empty.
      required: [expected_updated_at]
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string
        roles:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/IssuableRole'
        expected_updated_at:
          type: integer
          format: int64
          description: |
            The `updated_at` the edit was loaded against; a stale value → `ADMIN_MEMBER_EDIT_STALE`
            (no partial write).

    RegenerateCodeResponse:
      type: object
      description: A fresh Onboarding Code (shown once) + its expiry (AC6). The prior live code is superseded.
      required: [code_expires_at]
      properties:
        onboarding_code:
          type: string
          description: The fresh single-use code, shown once. Sensitive; TLS-only. Omitted from fixtures.
        code_expires_at:
          type: integer
          format: int64
          description: The fresh code's server-time expiry (epoch seconds).

    AuditEntry:
      type: object
      description: |
        One I5 PII-read audit record — field NAMES, never values (AC9). Mirrors `core::server::AuditEntry`.
        Carries no PII, so the audit-log read is not itself a recursive audited read.
      required: [timestamp, admin_id, member_id, fields, request_id]
      properties:
        timestamp:
          type: integer
          format: int64
          description: Server-time instant of the read (epoch seconds).
        admin_id:
          type: string
          format: uuid
        member_id:
          type: string
          format: uuid
        fields:
          type: array
          description: The field NAMES read (never values — AC9).
          items:
            type: string
            enum: [name, phone, address]
        request_id:
          type: string
          description: The server-minted opaque request correlation id (never client-echoed).

    AuditLog:
      type: object
      description: The group's PII-read audit log (AC9) — names only.
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/AuditEntry'

    # ── Admin WebAuthn store (Option B1) — spec 009 / ADR-0027 ──────────────────────────────
    # PII-FREE wire DTOs, byte-faithful to the core/server keyed-serde pins
    # (core/server/src/admin_webauthn.rs: admin_invite_record_wire_keys_are_pinned /
    # admin_credential_wire_keys_are_pinned). snake_case keys; `bytea` → base64url-no-pad strings;
    # timestamps → epoch-second integers; `consumed_at`/`revoked_at` present-but-nullable; the optional
    # `transports`/`aaguid` are OMITTED when absent. These never reuse a member-PII schema
    # (MemberDetail/MemberSummary/DuplicatePhoneLink), so the I5 negative gate is structural (D2/AC13).
    AdminInviteRecord:
      type: object
      description: |
        A pending-admin invitation row as invite-resolve returns it (PII-free → doubles as the wire
        DTO). The TTL/consumed *verdict* is computed edge-TS from `expires_at`/`consumed_at`; the HMAC
        token match ran in the core. Mirrors `core::server::AdminInviteRecord`.
      required: [admin_id, group_id, expires_at, consumed_at]
      properties:
        admin_id:
          type: string
          format: uuid
          description: The pending Admin (member) this invitation is for.
        group_id:
          type: string
          format: uuid
          description: The Group (the Worker's single-install GROUP_ID, D3); never a security input.
        expires_at:
          type: integer
          format: int64
          description: Server-side TTL instant (epoch seconds).
        consumed_at:
          type: [integer, 'null']
          format: int64
          description: Single-use marker (epoch seconds); `null` while live.

    AdminCredential:
      type: object
      description: |
        A stored admin WebAuthn credential (PII-free → doubles as the wire DTO). An admin may hold more
        than one active credential (passkey + hardware backup, AC20). The COSE public key + credential
        id are public, not secret. Mirrors `core::server::AdminCredential`.
      required: [credential_id, admin_id, public_key, sign_count, revoked_at]
      properties:
        credential_id:
          type: string
          description: The WebAuthn credential id (`bytea`) — base64url-no-pad on the wire.
        admin_id:
          type: string
          format: uuid
          description: The owning Admin (member) id.
        public_key:
          type: string
          description: The COSE public key (`bytea`) — base64url-no-pad. Public, not secret.
        sign_count:
          type: integer
          format: int64
          description: The WebAuthn signature counter; advanced only-if-greater (R10).
        transports:
          type: array
          description: The authenticator transports, if known (OMITTED when absent).
          items:
            type: string
        aaguid:
          type: string
          description: The authenticator AAGUID (`bytea`) — base64url-no-pad (OMITTED when absent).
        revoked_at:
          type: [integer, 'null']
          format: int64
          description: Revocation instant (epoch seconds); `null` while active.

    NewAdminCredential:
      type: object
      description: |
        The material to persist for a newly-registered credential (register-complete request leg).
        PII-free. No `admin_id` (derived from the consumed invitation row, never web-supplied) and no
        `revoked_at`. Mirrors `core::server::NewAdminCredential`.
      required: [credential_id, public_key, sign_count]
      properties:
        credential_id:
          type: string
          description: The WebAuthn credential id (`bytea`) — base64url-no-pad.
        public_key:
          type: string
          description: The COSE public key (`bytea`) — base64url-no-pad.
        sign_count:
          type: integer
          format: int64
          description: The initial signature counter from the registration ceremony.
        transports:
          type: array
          description: The authenticator transports, if the ceremony reported them.
          items:
            type: string
        aaguid:
          type: string
          description: The authenticator AAGUID (`bytea`) — base64url-no-pad, if reported.

    AdminRegisterCompleteResult:
      type: object
      description: |
        A successful register-complete: the invitation was consumed, prior credentials revoked, and the
        new credential inserted (one txn, R11). Carries the admin id DERIVED from the consumed invitation
        row (the audited actor, post-registration). PII-free.
      required: [admin_id]
      properties:
        admin_id:
          type: string
          format: uuid

    ResolveInviteRequest:
      type: object
      description: |
        The presented registration token, in the BODY (never the URL or a log line — R13/I10). Opaque,
        single-use, no PII (ADR-0015). The Worker hashes it in the core and looks it up by `token_hash`.
      required: [token]
      properties:
        token:
          type: string
          description: The opaque invitation token presented by the registering admin.

    RegisterCompleteRequest:
      type: object
      description: |
        The token to consume (in the body, R13) plus the new credential material from the
        already-verified edge-TS ceremony. The Worker derives the admin id from the consumed invitation
        — it is never supplied here.
      required: [token, credential]
      properties:
        token:
          type: string
          description: The opaque invitation token to consume (single-use).
        credential:
          $ref: '#/components/schemas/NewAdminCredential'

    CredentialLookupRequest:
      type: object
      description: |
        The presented `credential_id` for the usernameless sign-in lookup (in the body). Not secret, but
        kept off the URL for log/Referer hygiene. The admin id is read off the resolved credential.
      required: [credential_id]
      properties:
        credential_id:
          type: string
          description: The WebAuthn credential id (`bytea`) — base64url-no-pad.

    SignCountBumpRequest:
      type: object
      description: |
        The new signature counter from the verified assertion; applied only-if-greater (R10). The target
        credential is identified by the `{id}` path segment (base64url credential_id).
      required: [sign_count]
      properties:
        sign_count:
          type: integer
          format: int64
          description: The assertion's reported signature counter.
