name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  binding-drift:
    name: Binding-drift gate (ADR-0001)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bindings in sync (core/api ↔ api/generated)
        run: bash scripts/check-binding-drift.sh
      - name: Meta-test the drift gate
        run: bash scripts/test-binding-drift.sh

  network-allowlist:
    name: Network allow-list (I8 / AC13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-network-allowlist.sh

  rust-core:
    name: Rust core (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (pinned via rust-toolchain.toml)
        # `rustup show` materializes the channel + components + targets declared in
        # rust-toolchain.toml; the explicit adds below are idempotent belt-and-suspenders.
        run: |
          rustup show
          rustup component add rustfmt clippy
          rustup target add wasm32-unknown-unknown
      - name: rustfmt
        working-directory: core
        run: cargo fmt --all -- --check
      - name: clippy
        working-directory: core
        run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - name: test
        working-directory: core
        run: cargo test --locked --workspace
      - name: server build + test
        # `cargo test` builds the Worker crate AND runs the dependency-free static migration
        # convention test (server/tests/migrations.rs, T06). The live apply runs in the
        # `server-migrations` job below.
        working-directory: server
        run: cargo test --locked

  server-migrations:
    name: Migrations (apply · RLS · revert on Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: boundless_test
        ports:
          - 5432:5432
        # Hold the job until Postgres accepts connections.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # ubuntu-latest ships the postgresql-client (psql); DATABASE_URL makes the script run
      # (not self-skip). It applies 0001→0008, asserts bytea PII + forced RLS + isolation, then
      # reverts and asserts a clean teardown.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/boundless_test
    steps:
      - uses: actions/checkout@v4
      - name: Apply, verify, and revert migrations
        run: bash scripts/test-migrations.sh

  server-store:
    name: Server store (Postgres AuthStore adapter — ADR-0019)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: boundless_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Makes the boundless-server-store integration tests RUN (not self-skip): each applies the
      # T06 migrations into a fresh schema, connects as a NON-superuser role, and proves the
      # atomic / RLS / rotate-vs-replay-TOCTOU contracts against real Postgres (T07-shell slice A).
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/boundless_test
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (pinned via rust-toolchain.toml)
        run: |
          rustup show
          rustup component add rustfmt clippy
      - name: rustfmt
        working-directory: server
        run: cargo fmt --all -- --check
      - name: clippy
        working-directory: server
        run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - name: integration tests (real Postgres)
        working-directory: server
        run: cargo test --locked -p boundless-server-store

  web:
    name: Admin web (typecheck · vitest · build · webauthn + onboarding e2e — spec 001 T09/T10/T15)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Typecheck (svelte-check, strict)
        run: pnpm typecheck
      - name: Unit/integration tests (vitest)
        run: pnpm test
      - name: Build (SvelteKit)
        run: pnpm build
      - name: Install Chromium (virtual authenticator)
        run: pnpm exec playwright install --with-deps chromium
      - name: e2e — WebAuthn ceremony (AC20, T09) + admin onboarding UI (AC2/AC11b/AC1(b), T15)
        # `pnpm test:e2e` auto-starts the SvelteKit dev server (playwright webServer) for the T15
        # admin-onboarding suite (axe + virtual-authenticator through the real routes); the T09
        # verification-core ceremony suite serves its own page. GitHub-only.
        run: pnpm test:e2e

  boundlesskit:
    name: BoundlessKit (UniFFI XCFramework · iOS-sim smoke test — spec 001 T10-shell)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (pinned via rust-toolchain.toml) + iOS targets
        run: |
          rustup show
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim
      - name: Build the XCFramework and run the on-simulator smoke test
        # Drives core/ffi-swift → uniffi-bindgen → xcodebuild -create-xcframework →
        # xcodebuild test on a simulator (auto-detected iPhone). Proves the Rust core
        # crosses Rust → UniFFI → Swift and runs on-device. GitHub-only (needs macOS+Xcode).
        run: bash scripts/test-boundlesskit.sh

  boundlessrider:
    name: BoundlessRider (Rider onboarding UI · iOS-sim snapshot + a11y tests — spec 001 T11)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (pinned via rust-toolchain.toml) + iOS targets
        run: |
          rustup show
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim
      - name: Build BoundlessKit, then run the Rider UI snapshot + a11y tests
        # Builds the BoundlessKit XCFramework, then xcodebuild test on a simulator: the four a11y
        # snapshot variants per screen + the no-signup / no-toggle / VoiceOver-order / AC5/AC8/AC14/
        # AC15 logic tests. GitHub-only (needs macOS + Xcode). Snapshot baselines were recorded on a
        # pinned device config (iPhone13) with tolerant perceptualPrecision; if a runner's simulator
        # runtime diverges, baselines may need a one-time re-record (DEFERRED.md → Apple / T11).
        run: bash scripts/test-boundlessrider.sh

  boundlessdriver:
    name: BoundlessDriver (Driver onboarding UI · iOS-sim snapshot + a11y tests — spec 001 T12)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (pinned via rust-toolchain.toml) + iOS targets
        run: |
          rustup show
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim
      - name: Build BoundlessKit, then run the Driver UI snapshot + a11y tests
        # Builds the BoundlessKit XCFramework, then xcodebuild test on a simulator: the four a11y
        # snapshot variants per Driver screen + the Recovery-Code-capture / Driver-re-auth /
        # no-signup / VoiceOver-order / AC14 logic tests. DriverShared reuses RiderShared's renderer.
        # GitHub-only (needs macOS + Xcode). Baselines pinned to iPhone13 + tolerant
        # perceptualPrecision; a runner-runtime divergence may need a one-time re-record
        # (DEFERRED.md → Apple / Driver UI — T12).
        run: bash scripts/test-boundlessdriver.sh
