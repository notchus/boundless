# Cloudflare config for the Boundless admin web (SvelteKit). Spec 001 T15-shell leg A.
#
# This file exists so the admin-WebAuthn **challenge store** runs on a REAL Cloudflare KV namespace
# (ADR-0017 D3: one-time-use, ~5-min-TTL WebAuthn challenges) instead of the interim in-memory stub:
#   • `@sveltejs/adapter-cloudflare` reads these bindings and, during `vite dev`, calls
#     wrangler's `getPlatformProxy()` so `platform.env.CHALLENGES` is a live Miniflare KV — locally,
#     with NO Cloudflare account (only `wrangler deploy` needs one).
#   • The `kv-challenge-store.test.ts` Vitest suite calls `getPlatformProxy()` directly against this
#     same binding (real Miniflare KV, no account).
#
# DEPLOY IS OPERATOR-GATED (spec 009 T13): there is no `main`/`assets`/`pages_build_output_dir` here yet,
# so `pnpm build` builds in the adapter's default (Pages) mode with no account; the real deploy-target keys
# + the real KV namespace `id`s are finalized at deploy. Under Option B1 (ADR-0027) the web tier holds
# ZERO Postgres — WebAuthn invite/credential persistence lives behind the Rust admin Worker's B1 endpoints,
# reached over `ADMIN_WORKER_BASE` + the `ADMIN_API_SECRET` BFF secret — so there is NO web-tier Hyperdrive
# binding. See DEFERRED.md / docs/adr/0027.

name = "boundless-admin-web"
compatibility_date = "2026-06-05"
compatibility_flags = ["nodejs_compat"]

# Privacy: opt out of wrangler's first-party usage telemetry (to sparrow.cloudflare.com) for every
# wrangler invocation that reads this config — incl. getPlatformProxy() in `vite dev`/tests/CI. Boundless
# is privacy-by-design (I8); we suppress even build-tool phone-home. (server/wrangler.toml should match —
# see DEFERRED.md.)
send_metrics = false

# One-time-use WebAuthn challenge store (ADR-0017 D3). Miniflare emulates this locally by BINDING NAME;
# the `id` is a placeholder used only by `wrangler deploy` (deferred) — replace with the real namespace
# id at deploy time. The binding name MUST stay "CHALLENGES" (App.Platform + KvChallengeStore depend on it).
[[kv_namespaces]]
binding = "CHALLENGES"
id = "challenges_placeholder_replaced_at_deploy"

# Durable admin-session store (spec 009 D5/T06). Same KV pattern as CHALLENGES: Miniflare emulates it
# locally BY BINDING NAME (so `getPlatformProxy()` in `vite dev`/tests gives a live KV with no account);
# the `id` is a placeholder used only by `wrangler deploy` (deferred) — replaced with the real namespace
# id at deploy time (T09/T13). The binding name MUST stay "ADMIN_SESSIONS" (App.Platform + KvSessionStore
# depend on it).
[[kv_namespaces]]
binding = "ADMIN_SESSIONS"
id = "admin_sessions_placeholder_replaced_at_deploy"

# Plain (non-secret) configuration (spec 009 T09). These reach the DEPLOYED Worker via
# `$env/dynamic/private`; in `vite dev` they are NOT visible there (they surface only via `platform.env`,
# sveltejs/kit#15736), so the dev/e2e in-memory fallback path is unchanged. The byte-identical
# `ADMIN_API_SECRET` (ADR-0026 BFF) is a `wrangler secret`, NEVER committed here — the credential-scan
# gate (scripts/check-wrangler-credentials.sh) rejects any secret value in this file (AC6). Hosts carry
# REPLACE_AT_DEPLOY placeholders; the operator fills the real `*.workers.dev` (or custom-domain) values at
# deploy (T13).
[vars]
# The deployed Rust admin Worker origin (the ADR-0026 BFF target). A URL, not a secret.
ADMIN_WORKER_BASE = "https://boundless-worker.REPLACE_AT_DEPLOY.workers.dev"
# WebAuthn Relying-Party config (D7) — fully env-driven so the workers.dev → custom-domain cutover is a
# config change, not code. RP_ID is PERMANENT: changing it after passkeys exist invalidates them. In
# dev/test these stay unset (above), so `resolveRpConfig` derives localhost from the request URL.
WEBAUTHN_RP_ID = "boundless-admin-web.REPLACE_AT_DEPLOY.workers.dev"
WEBAUTHN_ORIGIN = "https://boundless-admin-web.REPLACE_AT_DEPLOY.workers.dev"
WEBAUTHN_RP_NAME = "Boundless"
