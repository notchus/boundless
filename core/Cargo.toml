# Boundless Rust core — virtual workspace (ADR-0001, docs/architecture.md §1).
#
# The single source of truth for domain types, crypto, auth, and sync. Native clients
# are GENERATED from these crates via UniFFI (Swift/Kotlin) and wasm-bindgen (web);
# hand-rolled platform duplicates are a CI failure (see scripts/check-binding-drift.sh).
#
# Scaffolded by spec 001 task T01. Crate bodies are filled in by later tasks (see each
# crate's lib.rs).
[workspace]
resolver = "2"
members = [
    "domain",
    "auth",
    "crypto",
    "sync",
    "server",
    "logging",
    "ffi-swift",
    "ffi-kotlin",
    "ffi-wasm",
]

[workspace.package]
version = "0.0.0"
edition = "2021"
# MSRV floor = the dryoc 0.8.0 minimum supported Rust version (verified 2026-06-04).
# The build toolchain itself is pinned in rust-toolchain.toml.
rust-version = "1.89"
license = "AGPL-3.0-only"
repository = "https://github.com/notchus/boundless"

[workspace.dependencies]
# Pinned per docs/stack-matrix.md. dryoc 0.8.0 is the latest PUBLISHED release on
# crates.io (MIT, pure-Rust, wasm32-compatible, MSRV 1.89). It is declared here but not
# yet activated by any member; core/crypto opts in via `dryoc.workspace = true` in T03.
dryoc = "0.8.0"

# Domain & value types (spec 001 T02). Versions verified 2026-06-04 (docs-researcher
# against crates.io); exact resolved versions are recorded in Cargo.lock (ground truth)
# and mirrored into docs/stack-matrix.md. All are MIT OR Apache-2.0 and wasm32-safe.
#
# serde — derive on the plain value types. uuid — backs MemberId; the `serde` feature
# ONLY, deliberately NO `v4`/`rng` (those pull `getrandom`, which would break wasm32 and
# violate "no ambient randomness" in core/domain — see docs/forbidden-patterns.md).
serde = { version = "1", features = ["derive"] }
uuid = { version = "1", features = ["serde"] }

# Keyed-hash crypto for core/crypto (spec 001 T03). HMAC-SHA256 backs the phone-lookup
# hash and the Onboarding/Recovery code-at-rest hash (I3/AC3). dryoc (declared above) has
# no SHA-256 — its `crypto_auth` is HMAC-SHA512-256 — so per ADR-0018 the keyed hash uses
# RustCrypto `hmac` + `sha2`, while dryoc remains the SOLE Ed25519 manifest-signature impl
# (ADR-0014). Both are pure-Rust, wasm32-safe, no `getrandom` (HMAC/SHA are deterministic).
# Versions verified 2026-06-04 against crates.io (`cargo add --dry-run`); lock is ground truth.
hmac = "0.13"
sha2 = "0.11"

# Internal crates, shared via the workspace. core/crypto takes the tainted value types
# (PhoneNumber/OnboardingCode/RecoveryCode) by reference so `expose_secret()` is confined
# to the crypto crate. core/auth (spec 001 T04) reuses boundless-domain and additionally
# composes boundless-crypto's constant-time matchers so the code-validation decision order
# (lifecycle gates → constant-time secret match) is single-sourced (P4).
boundless-domain = { path = "domain" }
boundless-crypto = { path = "crypto" }
# boundless-auth (spec 001 T04/T05) — the device-side auth decisions. core/server (spec 001
# T07) composes these (evaluate_onboarding_code/evaluate_recovery_code/evaluate_refresh/
# evaluate_version + the Clock trait + DeviceBinding/Session types) so the server enforces the
# exact same decisions the clients see — no drift (P4).
boundless-auth = { path = "auth" }

# serde_json — load/round-trip the golden fixtures (test) AND the canonical, sorted-key
# manifest serialization that the Ed25519 signature covers (normal dep of core/crypto, T03).
serde_json = "1"

# Zeroize the per-Group field-encryption keys on drop (spec 008 T02, ADR-0025 R2): GroupKey/Kek
# wipe their 32 bytes in `impl Drop`. Unlike the process-lifetime HmacKey, the Group key is
# unwrapped per-DO-init, so the threat is a DO memory snapshot — zeroize is load-bearing here.
# We do NOT enable the `derive` feature ourselves — the hand-rolled `impl Drop { self.0.zeroize() }`
# needs only the bare crate, and `[u8; 32]: Zeroize` is in core. (`zeroize_derive` is nonetheless
# already in Cargo.lock because other deps enable zeroize's derive feature; feature unification means
# `default-features = false` only trims OUR edge, it does not remove that crate from the graph.) The
# load-bearing fact: this adds NO new crate version — both `zeroize` 1.8.2 and `zeroize_derive`
# predate T02 (resolved transitively, e.g. via block-buffer); we add only the dependency edge.
# Pure-Rust, wasm32-safe, no getrandom. MIT OR Apache-2.0. Pinned spec 008 T02; lock = ground truth.
zeroize = { version = "1", default-features = false }

# Test-only. insta — serialization + redacted-summary snapshots (`json` feature required
# for assert_json_snapshot!). static_assertions — compile-time proof that the tainted /
# key / hash types expose no Debug/Display. base64 — decode the manifest fixtures' detached
# signature + public-key fields in core/crypto's invariants tests (T03).
insta = { version = "1", features = ["json"] }
static_assertions = "1.1"
base64 = "0.22"

# trybuild — the I5 require-audit COMPILE gate (spec 008 T06): drives `tests/ui/*.rs` compile-fail
# cases (a PII-returning path lacking the audit obligation must FAIL TO BUILD) + their committed
# `.stderr` golden files. DEV-ONLY / host-only — it shells out to `cargo build` over fixture crates,
# never compiles into the lib, so it carries no wasm/getrandom concern. Latest published release
# (verified 2026-06-10 via docs-researcher against crates.io). MIT OR Apache-2.0; lock = ground truth.
trybuild = "1.0.116"

# Property-based testing for core::auth's code/version invariants (spec 001 T04; P9).
# Latest published release on crates.io, verified 2026-06-04 via docs-researcher (MIT OR
# Apache-2.0, MSRV 1.85 ≤ the workspace 1.89 floor). DEV-ONLY / host-only — it never
# compiles into the wasm32 client/server target, so it carries no getrandom/wasm caveat.
# Failing seeds persist to each crate's committed `proptest-regressions/` (the Proptest
# Book's sanctioned "check these in" workflow — satisfies P9's reproducible-seeds rule).
proptest = "1.11"

# Minimal `block_on` for host unit tests of core/server's now-`async` AuthStore/DeviceStore
# ports (spec 001 T07-shell-B, the async-port bridge — ADR-0020). DEV-ONLY / host-only: it
# drives the in-memory stub's always-ready futures (no real I/O), so a full async runtime is
# unnecessary. Zero production dependencies (clean for the network allow-list, I8). Apache-2.0
# OR MIT, MSRV 1.69 ≤ the workspace 1.89 floor. Latest published release (0.4.0), verified
# 2026-06-05 via docs-researcher against crates.io; lock is ground truth.
pollster = "0.4"

# CSPRNG abstraction for the production SecretSource (spec 001 T07-shell-B, ADR-0021).
# rand_core — TRAITS ONLY (`default-features = false`, so NO `os_rng`/`getrandom` is pulled): the
# `RngCore`/`CryptoRng`/`SeedableRng` contracts that `core/server`'s `RngSecretSource<R>` is generic
# over. The RNG instance is INJECTED (the Worker supplies a getrandom-backed CSPRNG; tests a seeded
# one), so no ambient randomness enters the core and it stays wasm32-safe — same discipline as the
# injected `Clock`. rand_chacha (DEV-ONLY) — `ChaCha20Rng` (CryptoRng + SeedableRng) for reproducible,
# seeded host tests. Both are pure-Rust, MIT OR Apache-2.0, already resolved in Cargo.lock
# (rand_core 0.9.5 / rand_chacha 0.9.0, transitively present), so this adds NO new crate versions.
# The rand_core 0.9 `RngCore` API (not the 0.10 `Rng` rename) is deliberate — it is what is in the
# lock and pairs with rand_chacha 0.9. Verified against the vendored source 2026-06-05; lock = truth.
rand_core = { version = "0.9", default-features = false }
rand_chacha = "0.9"

# UniFFI — Rust→Swift/Kotlin binding generation (spec 001 T10-shell Swift leg → BoundlessKit;
# Android bring-up Kotlin leg → BoundlessCore). Apple/Android TOOLING ONLY — never on the wasm
# path: activated solely by core/ffi-swift AND core/ffi-kotlin. The wasm-safe core crates
# (domain/auth/crypto/server) stay uniffi-free; both ffi crates mirror their enums with
# exhaustive `From` conversions (a compile-checked parity guard, not a hand-rolled duplicate —
# ADR-0022). 0.31.1 = latest stable, verified 2026-06-05 via docs-researcher against crates.io
# (MPL-2.0; lock = ground truth). The `cli` feature (for the uniffi-bindgen binary) is enabled
# ONLY by the two ffi crates' own host-only `bindgen` feature — never by default, so clap stays
# out of the shipped iOS staticlib / Android `.so`.
uniffi = "0.31.1"
