# Boundless Rust toolchain pin.
#
# Pinned to the latest stable channel at project init (2026-06-04), verified to be
# >= the dryoc 0.8.0 MSRV (Rust 1.89). See docs/stack-matrix.md (Languages & toolchains)
# and DEFERRED.md ("Fill in the TODO version numbers").
#
# The wasm32-unknown-unknown target is required for the workers-rs edge build and the
# ffi-wasm crate (ADR-0001).
[toolchain]
channel = "1.95.0"
components = ["rustfmt", "clippy"]
targets = ["wasm32-unknown-unknown"]
profile = "minimal"
